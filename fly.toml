[app]
name = "sige-ucao"
primary_region = "cdg"

[build]
dockerfile = "Dockerfile"

[env]
APP_ENV = "production"
APP_DEBUG = "false"
LOG_CHANNEL = "stderr"
SESSION_DRIVER = "cookie"
CACHE_STORE = "array"
QUEUE_CONNECTION = "sync"
DB_CONNECTION = "pgsql"
PORT = "8080"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 0

[[vm]]
memory = "256mb"
cpu_kind = "shared"
cpus = 1
